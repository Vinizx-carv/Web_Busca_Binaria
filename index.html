<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busca Binária — Visualizador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #7c6cfa;
    --accent-dim: rgba(124,108,250,0.15);
    --accent2: #fa6c8a;
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.12);
    --green: #42e8a0;
    --green-dim: rgba(66,232,160,0.12);
    --elim: rgba(255,255,255,0.03);
    --radius: 10px;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,108,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,108,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(124,108,250,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* Header */
  header {
    margin-bottom: 2.5rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }

  .header-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(124,108,250,0.25);
    border-radius: 4px;
    padding: 4px 10px;
    white-space: nowrap;
    margin-top: 6px;
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(1.4rem, 4vw, 2.1rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
    letter-spacing: 0.01em;
  }

  /* Inputs panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }

  .panel-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 160px;
  }

  .input-group label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  input[type="text"],
  input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    width: 100%;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,108,250,0.12);
  }

  .input-group.small { flex: 0 0 120px; min-width: 100px; }

  .btn-run {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 11px 22px;
    cursor: pointer;
    transition: background .2s, transform .12s, box-shadow .2s;
    white-space: nowrap;
    box-shadow: 0 0 20px rgba(124,108,250,0.25);
  }

  .btn-run:hover {
    background: #9487fc;
    box-shadow: 0 0 30px rgba(124,108,250,0.4);
  }

  .btn-run:active { transform: scale(.97); }

  .err-msg {
    font-size: 12px;
    color: var(--accent2);
    margin-top: 8px;
    font-family: var(--mono);
    min-height: 16px;
  }

  /* Visualization area */
  .vis-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.75rem 1.5rem 1.25rem;
    margin-bottom: 1.25rem;
    min-height: 160px;
    position: relative;
    overflow: hidden;
  }

  .vis-panel::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity .4s;
  }

  .vis-panel.active::before { opacity: 1; }

  /* Array cells */
  .arr-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 8px;
  }

  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
  }

  .cell .idx {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .cell .box {
    width: 46px;
    height: 46px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    transition: all .28s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }

  /* Active range */
  .cell.active .box {
    border-color: rgba(124,108,250,0.5);
    background: rgba(124,108,250,0.1);
    color: var(--text);
    box-shadow: 0 0 0 1px rgba(124,108,250,0.2) inset;
  }

  /* Mid element */
  .cell.mid .box {
    border-color: var(--gold);
    background: var(--gold-dim);
    color: var(--gold);
    box-shadow: 0 0 16px rgba(245,200,66,0.2), 0 0 0 1px rgba(245,200,66,0.15) inset;
    transform: translateY(-4px) scale(1.08);
  }

  .cell.mid::after {
    content: 'mid';
    font-family: var(--mono);
    font-size: 9px;
    color: var(--gold);
    position: absolute;
    bottom: -16px;
    letter-spacing: 0.05em;
  }

  /* Found */
  .cell.found .box {
    border-color: var(--green);
    background: var(--green-dim);
    color: var(--green);
    box-shadow: 0 0 20px rgba(66,232,160,0.25), 0 0 0 1px rgba(66,232,160,0.2) inset;
    transform: translateY(-6px) scale(1.12);
    animation: pulse-found 1.2s ease-in-out infinite;
  }

  @keyframes pulse-found {
    0%, 100% { box-shadow: 0 0 20px rgba(66,232,160,0.25); }
    50%       { box-shadow: 0 0 36px rgba(66,232,160,0.5); }
  }

  .cell.found::after {
    content: '✓';
    font-size: 11px;
    color: var(--green);
    position: absolute;
    bottom: -18px;
  }

  /* Eliminated */
  .cell.elim .box {
    border-color: transparent;
    background: var(--elim);
    color: rgba(255,255,255,0.15);
  }

  /* Pointers row */
  .ptr-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    height: 28px;
    margin-bottom: 6px;
  }

  .ptr-cell {
    width: 46px;
    text-align: center;
    display: flex;
    gap: 3px;
    justify-content: center;
    align-items: flex-start;
    padding-top: 4px;
  }

  .ptr-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }

  .ptr-badge.L { background: rgba(124,108,250,0.2); color: var(--accent); }
  .ptr-badge.R { background: rgba(255,255,255,0.06); color: var(--muted); }
  .ptr-badge.M { background: var(--gold-dim); color: var(--gold); }

  /* Status */
  .status-bar {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    min-height: 22px;
    transition: color .2s;
  }

  .status-bar strong { color: var(--text); font-weight: 500; }
  .status-bar.is-found { color: var(--green); }
  .status-bar.is-fail { color: var(--accent2); }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 1.25rem;
  }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 9px 20px;
    cursor: pointer;
    transition: all .18s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .btn:active:not(:disabled) { transform: scale(.96); }

  .btn:disabled {
    opacity: .3;
    cursor: default;
  }

  .btn.restart { color: var(--muted); border-color: var(--border); }
  .btn.restart:hover:not(:disabled) { color: var(--accent2); border-color: var(--accent2); background: rgba(250,108,138,0.1); }

  /* Step counter */
  .step-counter {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }

  .step-counter span { color: var(--accent); }

  /* Log */
  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .log-header {
    padding: 12px 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .log-header-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .log-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: blink 2s ease-in-out infinite;
    display: none;
  }

  .log-dot.visible { display: block; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: .3; }
  }

  .log-list {
    max-height: 300px;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .log-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: all .2s;
    cursor: default;
  }

  .log-item .step-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    min-width: 16px;
    padding-top: 1px;
  }

  .log-item .tag {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tag.check  { background: rgba(124,108,250,0.15); color: var(--accent); }
  .tag.right  { background: rgba(124,108,250,0.1);  color: rgba(124,108,250,0.7); }
  .tag.left   { background: rgba(124,108,250,0.1);  color: rgba(124,108,250,0.7); }
  .tag.found  { background: var(--green-dim);        color: var(--green); }
  .tag.fail   { background: rgba(250,108,138,0.12);  color: var(--accent2); }
  .tag.start  { background: rgba(255,255,255,0.05);  color: var(--muted); }

  .log-item .log-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .log-item .log-text strong { color: var(--text); font-weight: 500; }

  .log-item.current {
    background: var(--surface2);
    border-color: var(--border2);
  }

  .log-item.current .step-num { color: var(--accent); }
  .log-item.current .log-text { color: var(--text); }

  /* Complexity badge */
  .complexity-row {
    display: flex;
    gap: 10px;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }

  .complexity-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .complexity-badge .cb-label {
    font-size: 11px;
    color: var(--muted);
  }

  .complexity-badge .cb-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 13px;
  }

  .empty-state .icon {
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.4;
  }

  @media (max-width: 560px) {
    .cell .box { width: 36px; height: 36px; font-size: 12px; }
    .ptr-cell  { width: 36px; }
    .arr-row   { gap: 4px; }
    .ptr-row   { gap: 4px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="header-badge">Algoritmo</div>
    </div>
    <div>
      <h1>Busca <span>Binária</span></h1>
      <p class="subtitle">Visualizador passo a passo — insira sua lista e encontre qualquer valor em O(log n)</p>
    </div>
  </header>

  <!-- Input -->
  <div class="panel">
    <div class="panel-label">Configuração</div>
    <div class="input-row">
      <div class="input-group">
        <label>Lista de valores (separados por vírgula)</label>
        <input type="text" id="inp-list" value="3, 7, 12, 18, 24, 31, 45, 52, 60, 75" placeholder="ex: 2, 5, 8, 13, 21, 34">
      </div>
      <div class="input-group small">
        <label>Valor alvo</label>
        <input type="number" id="inp-target" value="31">
      </div>
      <button class="btn-run" onclick="runSearch()">Executar →</button>
    </div>
    <div class="err-msg" id="err-msg"></div>
  </div>

  <!-- Visualization -->
  <div class="vis-panel" id="vis-panel">
    <div id="vis-content">
      <div class="empty-state">
        <div class="icon">⟨/⟩</div>
        Configure a lista acima e clique em <strong>Executar</strong> para iniciar.
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div id="step-counter" class="step-counter" style="display:none"></div>
  <div class="controls">
    <button class="btn" id="btn-prev" onclick="stepBack()" disabled>← Voltar</button>
    <button class="btn" id="btn-next" onclick="stepForward()" disabled>Avançar →</button>
    <button class="btn restart" id="btn-restart" onclick="restart()" disabled>↺ Reiniciar</button>
  </div>

  <!-- Log -->
  <div class="log-panel">
    <div class="log-header">
      <div class="log-dot" id="log-dot"></div>
      <div class="log-header-title">Passos da busca</div>
    </div>
    <div class="log-list" id="log-list">
      <div class="empty-state" style="padding:1.5rem">Nenhuma busca iniciada.</div>
    </div>
  </div>

  <!-- Complexity -->
  <div class="complexity-row">
    <div class="complexity-badge">
      <span class="cb-label">Tempo</span>
      <span class="cb-value">O(log n)</span>
    </div>
    <div class="complexity-badge">
      <span class="cb-label">Espaço</span>
      <span class="cb-value">O(1)</span>
    </div>
    <div class="complexity-badge">
      <span class="cb-label">Requer lista</span>
      <span class="cb-value">Ordenada</span>
    </div>
    <div class="complexity-badge" id="badge-steps" style="display:none">
      <span class="cb-label">Passos usados</span>
      <span class="cb-value" id="badge-steps-val">—</span>
    </div>
  </div>

</div>

<script>
let arr = [], target = 0, steps = [], currentStep = -1;

function buildSteps(arr, target) {
  const steps = [];
  let lo = 0, hi = arr.length - 1;
  steps.push({ lo, hi, mid: -1, phase: 'start', msg: `Iniciando busca pelo valor <strong>${target}</strong> em <strong>${arr.length}</strong> elementos. Intervalo inicial: [0, ${arr.length - 1}].` });
  while (lo <= hi) {
    const mid = Math.floor((lo + hi) / 2);
    steps.push({ lo, hi, mid, phase: 'check', msg: `Intervalo ativo [<strong>${lo}</strong> .. <strong>${hi}</strong>]. Meio = índice <strong>${mid}</strong>, valor = <strong>${arr[mid]}</strong>.` });
    if (arr[mid] === target) {
      steps.push({ lo, hi, mid, phase: 'found', msg: `<strong>${arr[mid]} = ${target}</strong> — valor encontrado no índice <strong>${mid}</strong>! Busca concluída.` });
      return steps;
    } else if (arr[mid] < target) {
      steps.push({ lo: mid+1, hi, mid, phase: 'right', msg: `<strong>${arr[mid]}</strong> &lt; <strong>${target}</strong>: o alvo está à direita. Descartamos [${lo}..${mid}]. Novo intervalo: [<strong>${mid+1}</strong> .. <strong>${hi}</strong>].` });
      lo = mid + 1;
    } else {
      steps.push({ lo, hi: mid-1, mid, phase: 'left', msg: `<strong>${arr[mid]}</strong> &gt; <strong>${target}</strong>: o alvo está à esquerda. Descartamos [${mid}..${hi}]. Novo intervalo: [<strong>${lo}</strong> .. <strong>${mid-1}</strong>].` });
      hi = mid - 1;
    }
  }
  steps.push({ lo, hi, mid: -1, phase: 'fail', msg: `Intervalo vazio — nenhum elemento restante. Valor <strong>${target}</strong> não está na lista.` });
  return steps;
}

function renderStep(idx) {
  const s = steps[idx];
  const n = arr.length;
  const visPanel = document.getElementById('vis-panel');
  visPanel.classList.add('active');

  // Build vis content
  let arrHtml = '<div class="arr-row">';
  let ptrHtml = '<div class="ptr-row">';

  for (let i = 0; i < n; i++) {
    let cls = '';
    if (s.phase === 'found' && i === s.mid) cls = 'found';
    else if (s.phase !== 'start' && s.mid !== -1 && i === s.mid) cls = 'mid';
    else if (s.phase !== 'start' && s.phase !== 'fail' && i >= s.lo && i <= s.hi) cls = 'active';
    else if (s.phase !== 'start') cls = 'elim';

    arrHtml += `<div class="cell ${cls}"><div class="idx">${i}</div><div class="box">${arr[i]}</div></div>`;

    let badges = '';
    if (s.phase !== 'start') {
      if (s.mid !== -1 && i === s.mid) badges += '<span class="ptr-badge M">M</span>';
      if (i === s.lo) badges += '<span class="ptr-badge L">L</span>';
      if (s.hi >= 0 && i === s.hi && i !== s.lo) badges += '<span class="ptr-badge R">R</span>';
      if (i === s.lo && i === s.hi) badges += '<span class="ptr-badge R">R</span>';
    }
    ptrHtml += `<div class="ptr-cell">${badges}</div>`;
  }

  arrHtml += '</div>';
  ptrHtml += '</div>';

  const statusClass = s.phase === 'found' ? 'is-found' : s.phase === 'fail' ? 'is-fail' : '';
  const statusHtml = `<div class="status-bar ${statusClass}">${s.msg}</div>`;

  document.getElementById('vis-content').innerHTML = arrHtml + ptrHtml + statusHtml;

  // Step counter
  const counter = document.getElementById('step-counter');
  counter.style.display = 'block';
  counter.innerHTML = `Passo <span>${idx + 1}</span> de <span>${steps.length}</span>`;

  // Update log highlight
  document.querySelectorAll('.log-item').forEach((el, i) => {
    el.classList.toggle('current', i === idx);
    if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });

  document.getElementById('btn-prev').disabled = idx <= 0;
  document.getElementById('btn-next').disabled = idx >= steps.length - 1;
  document.getElementById('badge-steps').style.display = '';
  document.getElementById('badge-steps-val').textContent = `${idx + 1} / ${steps.length}`;
}

const tagLabel = { start: 'início', check: 'comparar', right: '→ direita', left: '← esquerda', found: 'encontrado!', fail: 'não achado' };

function buildLog() {
  const list = document.getElementById('log-list');
  list.innerHTML = '';
  steps.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = `<span class="step-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="tag ${s.phase}">${tagLabel[s.phase] || s.phase}</span>
      <span class="log-text">${s.msg}</span>`;
    list.appendChild(item);
  });
  document.getElementById('log-dot').classList.add('visible');
}

function runSearch() {
  const listRaw = document.getElementById('inp-list').value;
  const targetRaw = document.getElementById('inp-target').value;
  const errEl = document.getElementById('err-msg');
  errEl.textContent = '';

  const parsed = listRaw.split(',').map(s => s.trim()).filter(Boolean).map(Number);
  if (parsed.some(isNaN)) { errEl.textContent = 'Lista inválida — use apenas números separados por vírgula.'; return; }
  if (parsed.length === 0) { errEl.textContent = 'Insira ao menos um valor na lista.'; return; }
  if (isNaN(Number(targetRaw))) { errEl.textContent = 'Valor alvo inválido.'; return; }

  const sorted = [...parsed].sort((a, b) => a - b);
  if (JSON.stringify(parsed) !== JSON.stringify(sorted)) {
    errEl.textContent = 'Lista reordenada automaticamente (requisito da busca binária).';
  }

  arr = sorted;
  target = Number(targetRaw);
  steps = buildSteps(arr, target);
  currentStep = 0;
  buildLog();
  renderStep(0);
  document.getElementById('btn-restart').disabled = false;
}
function stepForward() {
  if (currentStep < steps.length - 1) { currentStep++; renderStep(currentStep); }
}

function stepBack() {
  if (currentStep > 0) { currentStep--; renderStep(currentStep); }
}

function restart() {
  currentStep = 0;
  renderStep(0);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (steps.length === 0) return;
  if (e.key === 'ArrowRight') stepForward();
  if (e.key === 'ArrowLeft')  stepBack();
});
</script>
</body>
